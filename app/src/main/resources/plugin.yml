name: DSC
version: '${version}'
main: me.st4r.DSC.DSC
api-version: '1.21.11'
commands:
  pledge:
    description: Create and manage soul pledges.
    usage: /pledge
  soul:
    description: Admin command for granting and inspecting souls.
    usage: /soul
permissions:
  dsc.admin.soul:
    description: Allows use of the /soul admin command.
    default: op
